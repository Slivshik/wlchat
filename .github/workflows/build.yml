name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android SDK platforms and build tools
      run: |
        sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate debug keystore for release signing
      run: |
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Debug keystore generated"
        else
          echo "Debug keystore already exists"
        fi

    - name: Fetch native libraries from official release
      run: |
        curl -sLO "https://github.com/deltachat/deltachat-android/releases/download/v2.53.0/deltachat-gplay-release-2.53.0.apk"
        mkdir -p libs
        unzip -o deltachat-gplay-release-2.53.0.apk "lib/*" -d /tmp/dc-libs
        cp -r /tmp/dc-libs/lib/* libs/
        rm deltachat-gplay-release-2.53.0.apk
        echo "Native libraries extracted:"
        find libs -name "*.so" | head -10

    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        ./gradlew assembleFossDebug --no-daemon --no-build-cache -Dorg.gradle.jvmargs="-Xmx4g"

    - name: Build Release APK
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        ./gradlew assembleFossRelease --no-daemon --no-build-cache -Dorg.gradle.jvmargs="-Xmx4g"
        
    - name: Find APK files
      id: find-apk
      run: |
        echo "All APKs built:"
        find . -name "*.apk" -type f -exec echo "  {} ($(du -h {} | cut -f1))" \;
        # Find release APK first, then debug
        RELEASE_APK=$(find . -name "*foss*release*.apk" -type f | head -1)
        DEBUG_APK=$(find . -name "*foss*debug*.apk" -type f | head -1)
        # Prefer universal APK with native libs
        for apk in $(find . -name "*.apk" -type f); do
          if unzip -l "$apk" 2>/dev/null | grep -q "libnative-utils.so"; then
            if echo "$apk" | grep -q "release"; then
              RELEASE_APK="$apk"
            else
              DEBUG_APK="$apk"
            fi
          fi
        done
        echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
        echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
        echo "Release APK: $RELEASE_APK"
        echo "Debug APK: $DEBUG_APK"
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: wl-chat-release-apk
        path: ${{ steps.find-apk.outputs.release_apk }}
        retention-days: 30

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: wl-chat-debug-apk
        path: ${{ steps.find-apk.outputs.debug_apk }}
        retention-days: 14
