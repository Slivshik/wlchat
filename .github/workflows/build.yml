name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android SDK platforms and build tools
      run: |
        sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fetch native libraries from official release
      run: |
        curl -sLO "https://github.com/deltachat/deltachat-android/releases/download/v2.53.0/deltachat-gplay-release-2.53.0.apk"
        mkdir -p libs
        unzip -o deltachat-gplay-release-2.53.0.apk "lib/*" -d /tmp/dc-libs
        cp -r /tmp/dc-libs/lib/* libs/
        rm deltachat-gplay-release-2.53.0.apk
        echo "Native libraries extracted:"
        find libs -name "*.so" | head -10

    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        ./gradlew assembleFossDebug --no-daemon --no-build-cache -Dorg.gradle.jvmargs="-Xmx4g"

    - name: Find APK file
      id: find-apk
      run: |
        echo "All APKs produced by the build:"
        find . -name "*.apk" -type f

        # The build produces one APK per ABI split plus one "universal" APK containing all
        # ABIs (splits.abi.universalApk true in build.gradle). Sideloading an ABI-specific
        # split on a device with a different/unsupported CPU architecture (e.g. a 64-bit-only
        # phone getting the armeabi-v7a-only split) fails with "app not installed, incompatible
        # with your phone" - so for direct distribution we must always pick the universal one,
        # identified as the debug APK whose name does NOT carry one of the ABI tags.
        APK_PATH=$(find . -path "*/debug/*.apk" -type f \
          ! -name "*armeabi-v7a*" ! -name "*arm64-v8a*" ! -name "*x86_64*" ! -name "*x86*" \
          | head -1)

        if [ -z "$APK_PATH" ]; then
          echo "::error::Could not find the universal (all-ABI) debug APK among the build outputs above."
          exit 1
        fi

        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Selected universal APK: $APK_PATH"
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: wl-chat-debug-apk
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 14
