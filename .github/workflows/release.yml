name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android SDK platforms and build tools
      run: |
        sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode release keystore
      if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p keystore
        echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > keystore/release.keystore
        echo "Decoded persistent release keystore from secrets."

    - name: Generate debug keystore for release signing (fallback if no release keystore secret is set)
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Debug keystore generated"
        else
          echo "Debug keystore already exists"
        fi

    - name: Fetch native libraries from official release
      run: |
        curl -sLO "https://github.com/deltachat/deltachat-android/releases/download/v2.53.0/deltachat-gplay-release-2.53.0.apk"
        mkdir -p libs
        unzip -o deltachat-gplay-release-2.53.0.apk "lib/*" -d /tmp/dc-libs
        cp -r /tmp/dc-libs/lib/* libs/
        rm deltachat-gplay-release-2.53.0.apk
        echo "Native libraries extracted:"
        find libs -name "*.so" | head -10

    - name: Build Release APK
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        if [ -f "keystore/release.keystore" ]; then
          echo "Signing with the persistent release keystore."
          # build.gradle evaluates every signingConfigs block during configuration, not just the
          # one the invoked task actually uses, and releaseFdroid/releaseApk share the same
          # `project.hasProperty("DC_RELEASE_STORE_FILE")` gate as release - so all of their
          # referenced properties need to exist too, even though only "release" is used here.
          ./gradlew assembleFossRelease --no-daemon --no-build-cache \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -PDC_RELEASE_STORE_FILE="$GITHUB_WORKSPACE/keystore/release.keystore" \
            -PDC_RELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PDC_RELEASE_KEY_ALIAS_FDROID="$RELEASE_KEY_ALIAS" \
            -PDC_RELEASE_KEY_ALIAS_GPLAY="$RELEASE_KEY_ALIAS" \
            -PDC_RELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
        else
          echo "::warning::No RELEASE_KEYSTORE_BASE64 secret set - signing with the debug keystore. Every build will have a different signature until the persistent keystore secrets are added."
          ./gradlew assembleFossRelease --no-daemon --no-build-cache -Dorg.gradle.jvmargs="-Xmx4g"
        fi

    - name: Find APK file
      id: find-apk
      run: |
        APK_PATH=$(find . -name "*foss*release*.apk" -type f | head -1)
        for apk in $(find . -name "*.apk" -type f); do
          if unzip -l "$apk" 2>/dev/null | grep -q "libnative-utils.so"; then
            if echo "$apk" | grep -q "release"; then
              APK_PATH="$apk"
              break
            fi
          fi
        done
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Selected APK: $APK_PATH"
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: wl-chat-release-apk
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 30
